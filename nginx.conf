server {
    listen 3000;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    include /etc/nginx/mime.types;
    types {
        application/javascript mjs;
        application/wasm wasm;
    }

    # Enable Gzip compression to speed up loading (critical for Flutter JS files)
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript application/json application/wasm;

    location /api/ {
    # Remove the trailing slash from the proxy_pass URL 
    # to pass the full URI including /api/ to the backend.
    proxy_pass https://www.google.com/; 
    
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host www.google.com/; # Use the actual domain
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_cache_bypass $http_upgrade;
   }

    location / {
    try_files $uri $uri/ /index.html;

    add_header Cross-Origin-Embedder-Policy "require-corp" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;

    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
    expires -1;
    }

    # Explicitly handle WASM for CanvasKit renderer
    location ~* \.wasm$ {
        types {
            application/wasm wasm;
        }
        default_type application/wasm;
        
        # WASM files also need the COOP/COEP headers to be used by the main thread
        add_header Cross-Origin-Embedder-Policy "require-corp";
        add_header Cross-Origin-Opener-Policy "same-origin";
        
        add_header Cache-Control "public, max-age=31536000";
    }

    location ~* (custom_service_worker\.js)$ {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    expires 0;
    }

    # Cache static assets to improve performance
    location ~* \.(?:ico|css|gif|jpe?g|png|woff2?|eot|ttf|svg|json)$ {
        expires 6M;
        access_log off;
        # add_header Cache-Control "public";
        add_header Cache-Control no-cache;
    }

    error_page 404 /index.html;
    error_page 500 502 503 504 /50x.html;
}
